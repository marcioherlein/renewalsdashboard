<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 245" fill="none">
  <!-- Outer circle -->
  <circle cx="100" cy="90" r="76" stroke="#5A9070" stroke-width="2.5"/>

  <!-- Wave 1 – front -->
  <path d="M36,148 Q54,138 72,148 Q90,158 108,148 Q126,138 144,148 Q158,155 163,150"
        stroke="#5A9070" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wave 2 -->
  <path d="M40,156 Q58,146 76,156 Q94,166 112,156 Q130,146 148,156 Q158,161 163,158"
        stroke="#7FBFAA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Wave 3 – back -->
  <path d="M44,163 Q62,153 80,163 Q98,173 116,163 Q134,153 152,163"
        stroke="#A0D4C0" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>

  <!-- Back leaves – blue-gray -->
  <path d="M69,143 C61,114 65,70 78,45 C83,70 81,114 69,143Z" fill="#7E91AC" opacity="0.62"/>
  <path d="M131,143 C139,114 135,70 122,45 C117,70 119,114 131,143Z" fill="#7E91AC" opacity="0.62"/>

  <!-- Side leaves – medium green -->
  <path d="M79,142 C70,111 73,63 87,34 C93,63 92,111 79,142Z" fill="#6B9E72"/>
  <path d="M121,142 C130,111 127,63 113,34 C107,63 108,111 121,142Z" fill="#5A8A62"/>

  <!-- Stem -->
  <path d="M100,142 L100,104" stroke="#3D6B50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Central tall leaf -->
  <path d="M100,22 C123,43 127,82 123,107 C119,125 110,136 100,139 C90,136 81,125 77,107 C73,82 77,43 100,22Z"
        fill="#4D7C62"/>

  <!-- Brain / neural circuit pattern -->
  <!-- Left hemisphere -->
  <path d="M92,60 C88,56 85,62 87,68 C85,70 84,75 87,77 C86,81 88,86 94,83"
        stroke="rgba(255,255,255,0.52)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right hemisphere -->
  <path d="M108,60 C112,56 115,62 113,68 C115,70 116,75 113,77 C114,81 112,86 106,83"
        stroke="rgba(255,255,255,0.52)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Centre divider -->
  <line x1="100" y1="55" x2="100" y2="83" stroke="rgba(255,255,255,0.32)" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Horizontal cross-links -->
  <path d="M92,68 C96,66 104,66 108,68" stroke="rgba(255,255,255,0.32)" stroke-width="1" stroke-linecap="round"/>
  <path d="M93,76 C97,74 103,74 107,76" stroke="rgba(255,255,255,0.28)" stroke-width="1" stroke-linecap="round"/>
  <!-- Neural nodes -->
  <circle cx="100" cy="55" r="1.4" fill="rgba(255,255,255,0.55)"/>
  <circle cx="87" cy="68" r="1.1" fill="rgba(255,255,255,0.45)"/>
  <circle cx="113" cy="68" r="1.1" fill="rgba(255,255,255,0.45)"/>
  <circle cx="94" cy="83" r="1.1" fill="rgba(255,255,255,0.45)"/>
  <circle cx="106" cy="83" r="1.1" fill="rgba(255,255,255,0.45)"/>

  <!-- Tip accent leaves -->
  <path d="M100,22 C97,15 89,11 90,19 C93,21 97,22 100,22Z" fill="#90BF94" opacity="0.85"/>
  <path d="M100,22 C103,15 111,11 110,19 C107,21 103,22 100,22Z" fill="#A8CFA0" opacity="0.75"/>
  <path d="M97,22 C97,14 103,14 103,22" fill="#BCD8BE" opacity="0.55"/>

  <!-- Wordmark – optimised for dark backgrounds -->
  <text x="100" y="201"
        font-family="Georgia,'Times New Roman',serif"
        font-size="34" font-weight="700"
        fill="#D0EDD8"
        text-anchor="middle" letter-spacing="0.5">Sage</text>
  <text x="100" y="221"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11" font-weight="400"
        fill="#7AA888"
        text-anchor="middle" letter-spacing="4.5">ASSISTANT</text>
</svg>
